services:
  mysql:
    image: mysql:8.4
    container_name: supplier-risk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supplier-risk-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      APP_NAME: ${APP_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES}
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supplier-risk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET}
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  adminer:
    image: adminer:5
    container_name: supplier-risk-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "${ADMINER_PORT}:8080"

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
  backend_storage:
